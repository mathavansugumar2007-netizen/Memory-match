<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --card-back: #1e1e26;
    --card-border: #2e2e3e;
    --accent: #c8a96e;
    --accent2: #7c6fbf;
    --text: #e8e4d9;
    --muted: #5a5870;
    --success: #6dbf8f;
    --fail: #bf6d7c;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  /* Background grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  header {
    text-align: center;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .stats {
    display: flex;
    gap: 32px;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .stat-label {
    color: var(--muted);
    text-transform: uppercase;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
  }

  .stat-value {
    font-size: 1.4rem;
    font-weight: 500;
    color: var(--accent);
    font-family: 'Playfair Display', serif;
    min-width: 2ch;
    text-align: center;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    width: 100%;
  }

  .card {
    aspect-ratio: 1;
    position: relative;
    cursor: pointer;
    perspective: 800px;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card.flipped .card-inner,
  .card.matched .card-inner {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-back {
    background: var(--card-back);
    border: 1px solid var(--card-border);
    transition: border-color 0.2s;
  }

  .card:hover:not(.flipped):not(.matched) .card-back {
    border-color: var(--accent2);
  }

  .card-back::after {
    content: '';
    width: 40%;
    height: 40%;
    border: 1.5px solid var(--muted);
    border-radius: 4px;
    opacity: 0.4;
    transform: rotate(45deg);
  }

  .card-front {
    background: var(--surface);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    transform: rotateY(180deg);
    font-size: clamp(1.4rem, 5vw, 2rem);
    flex-direction: column;
    gap: 4px;
    transition: border-color 0.2s;
  }

  .card.matched .card-front {
    border-color: var(--success);
    background: color-mix(in srgb, var(--success) 8%, var(--surface));
    animation: matchPulse 0.5s ease;
  }

  .card.wrong .card-front {
    border-color: var(--fail);
    animation: wrongShake 0.4s ease;
  }

  @keyframes matchPulse {
    0% { transform: rotateY(180deg) scale(1); }
    50% { transform: rotateY(180deg) scale(1.06); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  @keyframes wrongShake {
    0%, 100% { transform: rotateY(180deg) translateX(0); }
    25% { transform: rotateY(180deg) translateX(-4px); }
    75% { transform: rotateY(180deg) translateX(4px); }
  }

  .btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px 28px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }

  .btn:hover {
    background: var(--accent);
    color: var(--bg);
  }

  .win-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    text-align: center;
    animation: fadeIn 0.6s ease;
  }

  .win-screen.visible { display: flex; }

  .win-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--success);
  }

  .win-sub {
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card {
    animation: cardIn 0.4s ease backwards;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Memory</h1>
    <div class="subtitle">Match the pairs</div>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Moves</div>
      <div class="stat-value" id="moves">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Pairs</div>
      <div class="stat-value" id="pairs">0/8</div>
    </div>
    <div class="stat">
      <div class="stat-label">Time</div>
      <div class="stat-value" id="timer">0s</div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="win-screen" id="winScreen">
    <div class="win-title">Well played.</div>
    <div class="win-sub" id="winSub"></div>
    <button class="btn" onclick="init()">Play again</button>
  </div>

  <button class="btn" id="restartBtn" onclick="init()">Restart</button>
</div>

<script>
  const EMOJIS = ['🌙','⭐','🔮','🦋','🌸','🍄','🐚','🌊'];
  let cards = [], flipped = [], matched = 0, moves = 0, lock = false;
  let startTime = null, timerInterval = null;

  function shuffle(arr) {
    return [...arr, ...arr].sort(() => Math.random() - 0.5);
  }

  function init() {
    clearInterval(timerInterval);
    startTime = null;
    moves = 0; matched = 0; flipped = []; lock = false;
    document.getElementById('moves').textContent = '0';
    document.getElementById('pairs').textContent = '0/8';
    document.getElementById('timer').textContent = '0s';
    document.getElementById('winScreen').classList.remove('visible');
    document.getElementById('restartBtn').style.display = '';

    const shuffled = shuffle(EMOJIS);
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    cards = shuffled.map((emoji, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = `${i * 0.04}s`;
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-back"></div>
          <div class="card-face card-front">${emoji}</div>
        </div>`;
      card.dataset.emoji = emoji;
      card.addEventListener('click', () => flip(card));
      grid.appendChild(card);
      return card;
    });
  }

  function flip(card) {
    if (lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;

    if (!startTime) {
      startTime = Date.now();
      timerInterval = setInterval(() => {
        document.getElementById('timer').textContent = Math.floor((Date.now() - startTime) / 1000) + 's';
      }, 500);
    }

    card.classList.add('flipped');
    flipped.push(card);

    if (flipped.length === 2) {
      moves++;
      document.getElementById('moves').textContent = moves;
      lock = true;

      if (flipped[0].dataset.emoji === flipped[1].dataset.emoji) {
        flipped.forEach(c => { c.classList.remove('flipped'); c.classList.add('matched'); });
        flipped = [];
        lock = false;
        matched++;
        document.getElementById('pairs').textContent = `${matched}/8`;
        if (matched === 8) win();
      } else {
        flipped.forEach(c => c.classList.add('wrong'));
        setTimeout(() => {
          flipped.forEach(c => { c.classList.remove('flipped', 'wrong'); });
          flipped = [];
          lock = false;
        }, 900);
      }
    }
  }

  function win() {
    clearInterval(timerInterval);
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById('restartBtn').style.display = 'none';
    document.getElementById('winSub').textContent = `${moves} moves · ${elapsed}s`;
    document.getElementById('winScreen').classList.add('visible');
  }

  init();
</script>
</body>
</html>
